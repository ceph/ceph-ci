meta:
- desc: |
   install ceph/squid v19.2.2
tasks:
- install:
    tag: v19.2.2
    exclude_packages:
      - librados3
      - ceph-mgr-dashboard
      - ceph-mgr-diskprediction-local
      - ceph-mgr-rook
      - ceph-mgr-cephadm
      - cephadm
      - ceph-volume
    extra_packages: ['librados2']
- print: "**** done installing squid v19.2.2"
- ceph:
    log-ignorelist:
      - overall HEALTH_
      - \(FS_
      - \(MDS_
      - \(OSD_
      - \(MON_DOWN\)
      - \(CACHE_POOL_
      - \(POOL_
      - \(MGR_DOWN\)
      - \(PG_
      - \(SMALLER_PGP_NUM\)
      - Monitor daemon marked osd
      - Behind on trimming
      - Manager daemon
    conf:
      global:
        mon warn on pool no app: false
        ms bind msgr2: false
        debug auth: 30
        debug monc: 30
      mon:
        debug mon: 30
    cluster-conf:
      global:
        auth mon ticket ttl: 30
        auth service ticket ttl: 30
- exec:
    osd.0:
      - ceph osd set-require-min-compat-client squid
- print: "**** done ceph"
