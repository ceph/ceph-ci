teuthology:
  postmerge:
  - |
    if yaml.teuthology.variables.wipe_service_keys then
        yaml.radosbench.sequential_yield[0].radosbench.auth_exit_on_failure = 99
        yaml.radosbench.sequential_yield[0].radosbench.expected_rc = 99
    end

radosbench:
  sequential_yield:
    - radosbench:
        clients: [client.0]
        time: 300
        unique_pool: true

tasks:
  - sequential_yield:
      - radosbench
